[build]
  command = "npm install && npm install --save-dev @netlify/esbuild"
  functions = "netlify/functions"
  publish = "public"

[functions]
  node_bundler = "esbuild"
  external_node_modules = []
  
[[redirects]]
  from = "/manifest.json"
  to = "/.netlify/functions/addon"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/addon"
  status = 200

[[redirects]]
  from = "/meta/*"
  to = "/.netlify/functions/addon"
  status = 200

[[redirects]]
  from = "/stream/*"
  to = "/.netlify/functions/addon"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/addon"
  status = 200

[build.environment]
  NODE_VERSION = "20"
