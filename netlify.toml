[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "public"

[functions]
  node_bundler = "esbuild"
  included_files = ["src/**"]
  
[[redirects]]
  from = "/manifest.json"
  to = "/.netlify/functions/addon"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/addon"
  status = 200

[[redirects]]
  from = "/meta/*"
  to = "/.netlify/functions/addon"
  status = 200

[[redirects]]
  from = "/stream/*"
  to = "/.netlify/functions/addon"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/addon"
  status = 200

[build.environment]
  NODE_VERSION = "20"
