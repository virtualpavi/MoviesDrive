name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate Vercel entrypoint import
        run: npm run check:vercel-entry

      - name: Syntax checks
        run: |
          node --check src/index.js
          node --check api/index.js
          node --check src/scrapers/moviesdrive.js
          node --check src/link-resolver.js

      - name: Run unit tests
        run: node --test tests/*.test.js
