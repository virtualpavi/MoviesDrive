name = "moviesdrive-addon"
main = "worker/index.js"
compatibility_date = "2024-01-01"

# Enable Node.js compatibility for import.meta, process.env, etc.
compatibility_flags = ["nodejs_compat"]

# Account ID (automatically set via GitHub secrets or add manually for local deployment)
# account_id = "your-account-id-here"

# Workers configuration
workers_dev = true

# Environment variables
[env.production]
name = "moviesdrive-addon"

[env.production.vars]
NODE_ENV = "production"
MOVIESDRIVE_API = "https://new1.moviesdrive.surf"
CACHE_TTL = "7200"
REQUEST_TIMEOUT = "15000"
MAX_CONCURRENT_REQUESTS = "5"

# Development environment
[env.development]
name = "moviesdrive-addon-dev"

[env.development.vars]
NODE_ENV = "development"
MOVIESDRIVE_API = "https://new1.moviesdrive.surf"
CACHE_TTL = "3600"
REQUEST_TIMEOUT = "10000"

# Build configuration
[build]
command = ""

# Limits
# Free tier: 100,000 requests/day
# CPU time: 10ms per request (Free), 50ms (Paid)
