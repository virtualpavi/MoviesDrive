version: '3.8'

services:
  moviesdrive-addon:
    build:
      context: .
      dockerfile: Dockerfile
    image: moviesdrive-stremio:latest
    container_name: moviesdrive-stremio
    ports:
      - "27828:27828"
    environment:
      NODE_ENV: production
      PORT: 27828
      HOST: 0.0.0.0
      MOVIESDRIVE_API: ${MOVIESDRIVE_API:-https://api.moviesdrive.com}
      API_CONFIG_URL: ${API_CONFIG_URL:-https://raw.githubusercontent.com/SaurabhKaperwan/Utils/refs/heads/main/urls.json}
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-10000}
      CACHE_TTL: ${CACHE_TTL:-3600}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:27828/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stremio-network

  # Optional: Redis for distributed caching
  redis:
    image: redis:7-alpine
    container_name: moviesdrive-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - stremio-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

networks:
  stremio-network:
    driver: bridge
